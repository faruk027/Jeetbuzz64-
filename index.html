<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeetbuzz</title>
    <!-- Add Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-analytics.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const analytics = firebase.analytics();
    </script>
    <script>
        // Visitor counter tracking code
        function trackVisitor() {
            const db = firebase.firestore();
            const counterRef = db.collection('visitors').doc('currentVisitors');
            counterRef.get().then((doc) => {
                if (doc.exists) {
                    const count = doc.data().count;
                    counterRef.update({ count: count + 1 });
                } else {
                    counterRef.set({ count: 1 });
                }
            });
        }
        window.onload = trackVisitor;
    </script>
</head>
<body>
    <h1>Welcome to Jeetbuzz!</h1>
</body>

</html>
